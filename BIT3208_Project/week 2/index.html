<!DOCTYPE html>
<html>
<head>
    <title>Smart E-Commerce</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Smart E-Commerce</a>

            <button class="btn btn-warning" onclick="showCart()">
                Cart
            </button>
        </div>
    </nav>

    <div class="container mt-4">

        <h1 class="text-center">Featured Products</h1>

        <div class="row">

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3>Laptop</h3>
                        <p>Ksh 80,000</p>

                        <button class="btn btn-primary"
                        onclick="addToCart('Laptop')">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3>Smartphone</h3>
                        <p>Ksh 45,000</p>

                        <button class="btn btn-primary"
                        onclick="addToCart('Smartphone')">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3>Headphones</h3>
                        <p>Ksh 5,000</p>

                        <button class="btn btn-primary"
                        onclick="addToCart('Headphones')">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
