<!DOCTYPE html>
<html>
<body>

Password:

<input type="password"
id="password"
onkeyup="checkPassword()">

<p id="result"></p>

<script>

function checkPassword(){

let password =
document.getElementById("password").value;

if(password.length < 6){

document.getElementById("result")
.innerHTML="Weak";

}else{

document.getElementById("result")
.innerHTML="Strong";

}

}

</script>

</body>
</html>
